# Render.com Blueprint — STELLAR SCREENER
# https://render.com/docs/blueprint-spec
#
# デプロイ手順:
#   1. GitHub にプッシュ
#   2. Render Dashboard → New → Blueprint → このリポジトリを選択
#      または New → Web Service → GitHub リポジトリを選択（設定は下記参照）
#   3. Environment タブで sync:false の機密変数を手動入力
#   4. Deploy
#
# 無料プラン注意:
#   - 15分間アクセスがないとスリープします（UptimeRobot 等での定期 ping 推奨）
#   - SQLite は再起動・再デプロイでリセットされます（永続化は有料 Disk が必要）

services:
  - type: web
    name: stellar-screener
    runtime: python
    plan: free
    region: singapore
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120 --limit-concurrency 50
    healthCheckPath: /health

    envVars:
      # Python / 文字コード（runtime.txt と併用可）
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUTF8
        value: "1"
      - key: PYTHONIOENCODING
        value: "utf-8"

      # SQLite（無料プラン: エフェメラル。再起動で消えます）
      - key: DB_PATH
        value: data/screener.db

      # 定時スキャン: Render 本番ではコード側でも無効化。GitHub Actions 運用を推奨
      - key: DISABLE_SCHEDULER
        value: "1"

      # --- 以下は Render UI から手動設定（sync: false）---
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      # Render から api.openai.com 直通不可時: Cloudflare AI Gateway 等を設定
      - key: OPENAI_FALLBACK_BASE_URL
        sync: false
