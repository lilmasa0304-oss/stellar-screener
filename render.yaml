# Render.com デプロイ設定
# ドキュメント: https://render.com/docs/yaml-spec
#
# 使い方:
#   1. GitHub にプッシュ
#   2. Render.com で "New Web Service" → GitHub リポジトリを選択
#   3. 環境変数（LINE_CHANNEL_ACCESS_TOKEN, LINE_USER_ID）を Render の
#      "Environment" タブで設定
#   4. Deploy ボタンを押す

services:
  - type: web
    name: stellar-screener
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT
    plan: free          # 無料プランで動作（スリープあり → UptimeRobot で対策）
    healthCheckPath: /health

    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false       # Render の UI から手動設定
      - key: LINE_USER_ID
        sync: false       # Render の UI から手動設定
      - key: DB_PATH
        value: /opt/render/project/data/screener.db  # 永続ディスクにマウント

    # 永続ディスク（有料プランのみ。無料プランでは data/ がリセットされます）
    # disk:
    #   name: screener-data
    #   mountPath: /opt/render/project/data
    #   sizeGB: 1
