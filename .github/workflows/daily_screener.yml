# ──────────────────────────────────────────────────────────────────────────
# STELLAR SCREENER — GitHub Actions 定時スキャン（CLI / DB 保存のみ）
#
# 毎平日 16:00 JST (= 07:00 UTC) に JPX400 スキャンを自動実行し、
# 結果を SQLite に保存します（通知は行いません）。
#
# 手動スキャンは Web ダッシュボード（web_app.py）を使用してください。
# ──────────────────────────────────────────────────────────────────────────

name: 📈 JPX400 Daily Screener (16:00 JST)

on:
  schedule:
    # 毎平日 07:00 UTC = 16:00 JST
    - cron: "0 7 * * 1-5"

  workflow_dispatch:

jobs:
  screen:
    name: 株式スクリーニング実行
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: DB ディレクトリを作成
        run: mkdir -p data

      - name: JPX400 スクリーニング実行
        run: python main.py --jpx400

      - name: スキャン結果を保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-db-${{ github.run_id }}
          path: data/screener.db
          retention-days: 30
          if-no-files-found: ignore
